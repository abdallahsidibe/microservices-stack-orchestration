# alertmanager.yml — Configuration Alertmanager
# À placer à la racine du projet

global:
  # Temps avant de renvoyer une alerte non résolue
  resolve_timeout: 5m

# Arbre de routage des alertes
route:
  # Groupement : les alertes du même service sont regroupées
  group_by: ['alertname', 'job']
  # Attendre 30s avant d'envoyer le groupe (pour regrouper les alertes simultanées)
  group_wait: 30s
  # Intervalle entre envois pour les nouvelles alertes dans un groupe existant
  group_interval: 5m
  # Répéter l'alerte toutes les heures si elle n'est pas résolue
  repeat_interval: 1h
  # Receiver par défaut
  receiver: 'console-log'

  # Sous-routes : les alertes critiques vont dans un canal séparé
  routes:
    - match:
        severity: critical
      receiver: 'console-log'
      group_wait: 10s   # Les critiques sont envoyées plus vite

receivers:
  # Receiver de base : log dans la console (pour le TP)
  - name: 'console-log'
    webhook_configs:
      - url: 'http://localhost:5001/'
        send_resolved: true

  # ── Bonus : Slack ───────────────────────────────────────────
  # Décommentez et configurez si vous voulez des alertes Slack
  # - name: 'slack'
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
  #       channel: '#monitoring'
  #       title: '{{ .CommonAnnotations.summary }}'
  #       text: '{{ .CommonAnnotations.description }}'

# Règles d'inhibition : évite de recevoir des alertes redondantes
# Si un service est DOWN, on inhibe les alertes de latence et d'erreur pour ce service
inhibit_rules:
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: 'HighErrorRate|HighLatencyP99'
    equal: ['job']
